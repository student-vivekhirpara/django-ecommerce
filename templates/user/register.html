{% extends 'user/base.html' %}
{% load static %}

{% block content %}

<section class="py-5" style="background-color:#fdfdfd ;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-12">

                <div class="bg-white p-5  rounded-4 shadow">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-black">Registration</h2>
                        <p class="fw-bold text-bold text-black">
                            Fill in your details below to create your account.
                        </p>
                    </div>

                    <form action="/user/register_store" method="POST">
                        {% csrf_token %}

                        <!-- First Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">First Name</label>
                            <input type="text" name="f_name"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your First Name" required>
                        </div>

                        <!-- Last Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Last Name</label>
                            <input type="text" name="l_name"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your Last Name" required>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Username</label>
                            <input type="text" name="username"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your Username" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Email Address</label>
                            <input type="email" name="email"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your Email" required>
                        </div>

                        <!-- Contact Number -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Contact Number</label>
                            <input type="tel" name="contact"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your Contact Number" required>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Password</label>
                            <input type="password" name="password"
                                   class="form-control fw-bold"
                                   placeholder="Enter Password" required>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label fw-bold text-black">Confirm Password</label>
                            <input type="password" name="confirm_password"
                                   class="form-control fw-bold"
                                   placeholder="Confirm Password" required>
                        </div>

                        <div class="text-end mb-3">
                            <a href="/user/forgate_password" 
                                    class="text-decoration-none fw-semibold"
                                    style="font-size:14px;">
                                    Forgot Password?
                            </a>
                        </div>

                        <!-- Button -->
                        <div class="text-center">
                            <button type="submit"
                                    class="btn fw-bold px-4 py-2 rounded-3"
                                    style="background:#000; color:#fff;">
                                Sign up
                            </button>
                        </div>


                    </form>

                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
