{% extends 'user/base.html' %}
{% load static %}

{% block content %}
<section class="py-5" style="background-color:#fdfdfd ;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-12">

                <div class="bg-white p-5  rounded-4 shadow">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-black">Inquiry</h2>
                        <p class="fw-bold text-bold text-black">
                           Thank you for your interest. Please complete the inquiry form below.
                        </p>
                    </div>

                    <form action="/user/inquiry_store" method="POST">
                        {% csrf_token %}

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Full Name</label>
                            <input type="text" name="f_name"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your First Name" required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Email Address</label>
                            <input type="email" name="email"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your Email" required>
                        </div>

                        <!-- Contact Number -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Contact Number</label>
                            <input type="tel" name="contact"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your Contact Number" required>
                        </div>

                        <!-- Messsage -->
                        <div class="mb-3">
                             <label class="form-label fw-bold text-black">Message</label>
                             <textarea name="message"
                                   class="form-control fw-bold"
                                   rows="4"
                                   placeholder="Enter Your Message"
                                   required></textarea>
                        </div>

                        <!-- Button -->
                        <div class="text-center">
                            <button type="submit"
                                    class="btn fw-bold px-4 py-2 rounded-3"
                                    style="background:#000; color:#fff;">
                                Submit Inquiry
                            </button>
                        </div>


                    </form>

                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
