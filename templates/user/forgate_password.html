{% extends 'user/base.html' %}
{% load static %}

{% block content %}

<section class="py-5" style="background-color:#fdfdfd ;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10 col-12">

                <div class="bg-white p-5  rounded-4 shadow">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-black">Change Password</h2>
                        <p class="fw-bold  text-black">
                            For security reasons, please enter your current password and choose a new one.
                        </p>
                    </div>

                    <form action="/user/forgate_password_check" method="POST">
                        {% csrf_token %}

                         <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-bold text-black">Email Address</label>
                            <input type="email" name="email"
                                   class="form-control fw-bold"
                                   placeholder="Enter Your Email" required>
                        </div>

                        <!-- Button -->
                        <div class="text-center">
                            <button type="submit"
                                    class="btn fw-bold px-4 py-2 rounded-3"
                                    style="background:#000; color:#fff;">
                                change password 
                            </button>
                        </div>


                    </form>

                </div>

            </div>
        </div>
    </div>
</section>
{% endblock %}
