{% extends 'project/home.html' %}
{% load static %}

{% block content %}

<div class="pcoded-content">
    <div class="pcoded-inner-content">

        <!-- Card Start -->
        <div class="card">

            <div class="card-header">
                <h2>Add Category</h2>
            </div>

            <div class="card-block">
                <h4 class="sub-title">Category</h4>

                <form method="POST" action="category_store">
                    {% csrf_token %}

                    <div class="form-group row">
                        <label class="col-sm-2 col-form-label">
                            Category Name
                        </label>

                        <div class="col-sm-10">
                            <input type="text"
                                   name="category_name"
                                   class="form-control"
                                   placeholder="Enter Category Name">
                        </div>
                    </div>

                    <div class="form-group row">
                        <div class="col-sm-10 offset-sm-2 text-center">
                            <button type="submit" class="btn btn-primary">
                                Add Category
                            </button>
                        </div>
                    </div>

                </form>

            </div> <!-- card-block -->

        </div> <!-- card -->

    </div> <!-- pcoded-inner-content -->
</div> <!-- pcoded-content -->

{% endblock %}
