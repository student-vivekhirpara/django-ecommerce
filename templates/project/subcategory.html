{% extends 'project/home.html' %}
{% load static %}

{% block content %}

<div class="pcoded-content">
    <div class="pcoded-inner-content">

        <!-- Main Body Start -->
        <div class="main-body">
            <div class="page-wrapper">

                <!-- Page Body Start -->
                <div class="page-body">
                    <div class="row">
                        <div class="col-sm-12">

                            <!-- Card Start -->
                            <div class="card">

                                <div class="card-header">
                                    <h2>Subcategory</h2>
                                </div>

                                <div class="card-block">
                                    <h4 class="sub-title">Subcategory</h4>

                                    <form method="POST" action="subcategory_store">
                                        {% csrf_token %}

                                        <!-- Subcategory Name -->
                                        <div class="form-group row">
                                            <label class="col-sm-2 col-form-label">
                                                Subcategory Name
                                            </label>

                                            <div class="col-sm-10">
                                                <input type="text"
                                                       name="subcategory_name"
                                                       class="form-control"
                                                       placeholder="Enter Subcategory Name">
                                            </div>
                                        </div>

                                        <!-- Category Dropdown -->
                                        <div class="form-group row">
                                            <label class="col-sm-2 col-form-label">
                                                Category Name
                                            </label>

                                            <div class="col-sm-10">
                                                <select name="name"
                                                        class="form-control">
                                                    <option value="">
                                                        -- Select Category --
                                                    </option>

                                                    {% for i in cg %}
                                                        <option value="{{ i.id }}">
                                                            {{ i.name }}
                                                        </option>
                                                    {% endfor %}

                                                </select>
                                            </div>
                                        </div>

                                        <!-- Submit Button -->
                                        <div class="form-group row">
                                            <div class="col-sm-10 offset-sm-2 text-center">
                                                <button type="submit"
                                                        class="btn btn-primary">
                                                    Add Subcategory
                                                </button>
                                            </div>
                                        </div>

                                    </form>

                                </div> <!-- card-block -->

                            </div> <!-- card -->

                        </div> <!-- col-sm-12 -->
                    </div> <!-- row -->
                </div> <!-- page-body -->

            </div> <!-- page-wrapper -->
        </div> <!-- main-body -->

    </div> <!-- pcoded-inner-content -->
</div> <!-- pcoded-content -->

{% endblock %}
